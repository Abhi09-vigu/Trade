<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trade Analysis Pro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dark-theme">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="container main-container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold gradient-text">AI Trade Analysis Pro</h1>
            <p class="text-muted lead">Advanced Market Insights Powered by Google Gemini</p>
        </header>

        <div class="row g-4">
            <!-- Left Column: Input Form -->
            <div class="col-lg-5">
                <div class="glass-card p-4">
                    <h4 class="mb-4 fw-semibold border-bottom border-secondary pb-2">Market Data Input</h4>
                    <form id="analysis-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Symbol</label>
                                <input type="text" class="form-control" id="symbol" required placeholder="e.g. BTC/USD" value="BTC/USD">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Current Price</label>
                                <input type="number" step="any" class="form-control" id="price" required placeholder="e.g. 64000" value="64000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">RSI (14)</label>
                                <input type="number" step="any" class="form-control" id="rsi" required placeholder="e.g. 45" value="45">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Moving Average</label>
                                <input type="number" step="any" class="form-control" id="ma" required placeholder="e.g. 62000" value="62000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Trend</label>
                                <select class="form-select" id="trend" required>
                                    <option value="Uptrend" selected>Uptrend</option>
                                    <option value="Downtrend">Downtrend</option>
                                    <option value="Sideways">Sideways</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label form-label-sm">Volume</label>
                                <input type="text" class="form-control" id="volume" required placeholder="e.g. 1.2B" value="1.2B">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-4 custom-btn">
                            <span class="btn-text">Analyze Market</span>
                            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Results -->
            <div class="col-lg-7">
                <div class="glass-card p-4 h-100 d-flex flex-column relative-container">
                    <h4 class="mb-4 fw-semibold border-bottom border-secondary pb-2">Analysis Results</h4>
                    
                    <div id="initial-state" class="flex-grow-1 d-flex flex-column align-items-center justify-content-center text-muted py-5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-bar-chart-line mb-3 opacity-50" viewBox="0 0 16 16">
                            <path d="M11 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12h.5a.5.5 0 0 1 0 1H.5a.5.5 0 0 1 0-1H1v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h1V7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7h1zM2 13h2v-3H2zm5-6h2v6H7zm5-5h2v11h-2z"/>
                        </svg>
                        <p>Enter data and run analysis to see insights.</p>
                    </div>

                    <div id="error-alert" class="alert alert-danger d-none mt-3" role="alert"></div>

                    <div id="results-container" class="d-none flex-grow-1 mt-2">
                        <!-- Parsed results will be injected here -->
                        <div class="content-card h-100 p-4" style="background: rgba(255,255,255,0.05); border-radius: 12px;">
                            <div class="content-body fs-5 fw-medium text-light" id="raw-analysis" style="white-space: pre-wrap; line-height: 1.8;">--</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Row -->
        <div class="row g-4 mt-2">
            <div class="col-12">
                <div class="glass-card p-4 d-flex flex-column h-100" style="min-height: 500px;">
                    <h4 class="mb-4 fw-semibold border-bottom border-secondary pb-2">Market Data Chart</h4>
                    <div id="tradingview_chart" class="flex-grow-1" style="height: 100%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- TradingView Widget Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Initialize TradingView Chart
        let tvWidget = null;
        function updateChart(symbol) {
            let cleanSymbol = symbol.replace('/', '');
            
            tvWidget = new TradingView.widget({
                "autosize": true,
                "symbol": cleanSymbol,
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "enable_publishing": false,
                "backgroundColor": "rgba(0, 0, 0, 0)", // transparent for glassmorphism
                "gridColor": "rgba(255, 255, 255, 0.06)",
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tradingview_chart",
                "studies": [
                    "RSI@tv-basicstudies",
                    "MASimple@tv-basicstudies"
                ]
            });
        }
        
        // Initial load
        updateChart('BTC/USD');

        document.getElementById('analysis-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = this.querySelector('button[type="submit"]');
            const btnText = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner-border');
            
            // UI State - Loading
            btn.disabled = true;
            btnText.textContent = 'Analyzing...';
            spinner.classList.remove('d-none');
            
            document.getElementById('initial-state').classList.add('d-none');
            document.getElementById('results-container').classList.add('d-none');
            document.getElementById('error-alert').classList.add('d-none');

            const payload = {
                symbol: document.getElementById('symbol').value,
                price: parseFloat(document.getElementById('price').value),
                rsi: parseFloat(document.getElementById('rsi').value),
                ma: parseFloat(document.getElementById('ma').value),
                trend: document.getElementById('trend').value,
                volume: document.getElementById('volume').value
            };

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Something went wrong processing the request.');
                }

                if (!data.analysis) {
                    throw new Error('Received empty analysis from API.');
                }

                // Parse the strict output
                parseAndDisplayResult(data.analysis);

            } catch (err) {
                document.getElementById('error-alert').textContent = err.message;
                document.getElementById('error-alert').classList.remove('d-none');
                document.getElementById('initial-state').classList.remove('d-none');
            } finally {
                // UI State - Reset
                btn.disabled = false;
                btnText.textContent = 'Analyze Market';
                spinner.classList.add('d-none');
                
                // Update the chart to match the new symbol
                updateChart(payload.symbol);
            }
        });

        function parseAndDisplayResult(text) {
            document.getElementById('raw-analysis').textContent = text.trim();
            document.getElementById('results-container').classList.remove('d-none');
        }
    </script>
</body>
</html>
